name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Create test environment
        run: |
          cat > .env <<'ENVEOF'
          APP_NAME=NFT Marketplace Backend
          APP_VERSION=1.0.0
          DEBUG=false
          API_V1_PREFIX=/api/v1

          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/nft_marketplace

          JWT_SECRET_KEY=github-actions-test-secret-key-2026-long-enough
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30

          REDIS_URL=redis://localhost:6379/0

          STORAGE_PROVIDER=minio
          S3_ENDPOINT_URL=http://localhost:9000
          S3_ACCESS_KEY=nftmarketplace
          S3_SECRET_KEY=nft-minio-password-2026
          S3_BUCKET_NAME=nft-assets
          S3_REGION=us-east-1
          S3_PUBLIC_URL=http://localhost:9000/nft-assets

          MAX_UPLOAD_SIZE_MB=10
          ALLOWED_IMAGE_TYPES=image/jpeg,image/png,image/webp

          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=nft_marketplace

          MINIO_ROOT_USER=nftmarketplace
          MINIO_ROOT_PASSWORD=nft-minio-password-2026
          ENVEOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall app tests

      - name: Run tests
        run: pytest -v
